<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight Overlay</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="page">
        <h1>Interactive Spotlight Overlay</h1>
        

        <section class="stage-wrap" aria-label="Spotlight demo">
            <div class="stage" id="stage">
                <img
                    id="photo"
                    src="background-image.jpeg"
                    alt="Demo img"
                >
                <div id="dimBlurLayer" class="dim-blur-layer" aria-hidden="true"></div>
                <div id="spotlight" class="spotlight" aria-hidden="true"></div>
            </div>
            <p class="size-label">Spotlight diameter: <span id="sizeValue">100</span>px</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
